<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Breakdown & Savings Board</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3f;
    --accent: #00e5a0;
    --warn: #ff6b4a;
    --blue: #4a9eff;
    --purple: #b06aff;
    --yellow: #ffd166;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 32px 24px;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  .header-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sub {
    margin-top: 8px;
    color: var(--muted);
    font-size: 13px;
  }

  /* Grid layouts */
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px; }
  .grid-full { margin-bottom: 20px; }

  @media (max-width: 700px) {
    .grid-3, .grid-2 { grid-template-columns: 1fr; }
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent-line, var(--accent));
    opacity: 0.6;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .card-value {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .card-value.warn { color: var(--warn); }
  .card-value.blue { color: var(--blue); }
  .card-value.yellow { color: var(--yellow); }
  .card-value.purple { color: var(--purple); }

  .card-desc {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* Section headers */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Tax breakdown bar */
  .breakdown-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  .breakdown-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--purple));
    opacity: 0.7;
    border-radius: 16px 16px 0 0;
  }

  .breakdown-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    color: #fff;
  }

  .bar-row {
    margin-bottom: 18px;
  }

  .bar-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 12px;
  }

  .bar-name { color: var(--text); }
  .bar-amount { color: var(--accent); font-weight: 500; }

  .bar-track {
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    animation: barGrow 1s ease both;
    animation-delay: var(--delay, 0s);
    transform-origin: left;
  }

  /* Penalty box */
  .penalty-box {
    background: rgba(255,107,74,0.08);
    border: 1px solid rgba(255,107,74,0.25);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .penalty-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .penalty-tag {
    background: rgba(255,107,74,0.15);
    color: var(--warn);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid rgba(255,107,74,0.3);
  }

  .penalty-amount {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--warn);
  }

  /* FTA steps */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .step {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .step-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .step-content {}
  .step-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .step-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }

  /* Savings options */
  .savings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }

  .savings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
    animation: fadeUp 0.5s ease both;
  }

  .savings-card:hover {
    border-color: var(--card-accent, var(--accent));
    transform: translateY(-2px);
  }

  .savings-icon {
    font-size: 22px;
    margin-bottom: 10px;
  }

  .savings-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }

  .savings-value {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .savings-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 99px;
    margin-top: 8px;
    font-weight: 600;
  }

  .badge-green { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.25); }
  .badge-blue { background: rgba(74,158,255,0.12); color: var(--blue); border: 1px solid rgba(74,158,255,0.25); }
  .badge-yellow { background: rgba(255,209,102,0.12); color: var(--yellow); border: 1px solid rgba(255,209,102,0.25); }
  .badge-purple { background: rgba(176,106,255,0.12); color: var(--purple); border: 1px solid rgba(176,106,255,0.25); }

  /* Summary total */
  .total-bar {
    background: linear-gradient(135deg, rgba(0,229,160,0.08), rgba(74,158,255,0.08));
    border: 1px solid rgba(0,229,160,0.2);
    border-radius: 16px;
    padding: 24px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 20px;
    animation: fadeUp 0.5s ease 0.3s both;
  }

  .total-label {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }

  .total-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .total-nums {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .total-item { text-align: right; }
  .total-item-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .total-item-val {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes barGrow {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-label">📋 Tax Summary · $30K Income · California</div>
    <h1>Your Tax Situation,<br>Broken Down.</h1>
    <div class="header-sub">Late filing · FTA waiver · Savings opportunities</div>
  </div>

  <!-- Top KPI Cards -->
  <div class="section-title">Income & Tax at a Glance</div>
  <div class="grid-3">
    <div class="card" style="--accent-line: var(--blue);">
      <div class="card-label">Gross Income</div>
      <div class="card-value blue">$30,000</div>
      <div class="card-desc">Total annual income before deductions</div>
    </div>
    <div class="card" style="--accent-line: var(--warn);">
      <div class="card-label">Est. Total Tax Owed</div>
      <div class="card-value warn">~$2,500</div>
      <div class="card-desc">Federal ~$1,750 + CA state ~$700</div>
    </div>
    <div class="card" style="--accent-line: var(--accent);">
      <div class="card-label">Effective Tax Rate</div>
      <div class="card-value">~8.3%</div>
      <div class="card-desc">Combined federal + CA on $30K income</div>
    </div>
  </div>

  <!-- Tax Breakdown Bars -->
  <div class="section-title">Tax Breakdown</div>
  <div class="breakdown-card" style="position:relative;">
    <div class="breakdown-title">Where Your Money Goes</div>

    <div class="bar-row">
      <div class="bar-header">
        <span class="bar-name">Gross Income</span>
        <span class="bar-amount">$30,000</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:100%; background: linear-gradient(90deg, #4a9eff, #b06aff); --delay:0.1s;"></div>
      </div>
    </div>

    <div class="bar-row">
      <div class="bar-header">
        <span class="bar-name">Federal Standard Deduction</span>
        <span class="bar-amount" style="color:var(--accent);">−$14,600</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:48.7%; background: rgba(0,229,160,0.5); --delay:0.2s;"></div>
      </div>
    </div>

    <div class="bar-row">
      <div class="bar-header">
        <span class="bar-name">Federal Taxable Income</span>
        <span class="bar-amount" style="color:var(--yellow);">$15,400</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:51.3%; background: linear-gradient(90deg, #ffd166, #ff9f43); --delay:0.3s;"></div>
      </div>
    </div>

    <div class="bar-row">
      <div class="bar-header">
        <span class="bar-name">Federal Tax</span>
        <span class="bar-amount" style="color:var(--warn);">~$1,750</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:5.8%; background: var(--warn); --delay:0.4s;"></div>
      </div>
    </div>

    <div class="bar-row">
      <div class="bar-header">
        <span class="bar-name">CA Standard Deduction</span>
        <span class="bar-amount" style="color:var(--accent);">−$5,202</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:17.3%; background: rgba(0,229,160,0.4); --delay:0.5s;"></div>
      </div>
    </div>

    <div class="bar-row" style="margin-bottom:0;">
      <div class="bar-header">
        <span class="bar-name">CA State Tax</span>
        <span class="bar-amount" style="color:var(--purple);">~$700</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:2.3%; background: var(--purple); --delay:0.6s;"></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Penalty + FTA -->
  <div class="section-title">Late Filing Penalty & Abatement</div>
  <div class="grid-2">

    <!-- Penalty Card -->
    <div class="card" style="--accent-line: var(--warn);">
      <div class="card-label">The Problem</div>
      <div class="penalty-box">
        <div class="penalty-header">
          <span class="penalty-tag">⚠ Late Filing Penalty</span>
          <span class="penalty-amount">$600</span>
        </div>
        <div style="font-size:12px; color:var(--muted); line-height:1.6;">
          IRS failure-to-file = 5% of unpaid tax per month (up to 25%). At $2,500 tax owed and 4–5 months late, $600 tracks.<br><br>
          <strong style="color:var(--warn);">Your tax guy filed late. He should be making this call.</strong>
        </div>
      </div>
      <div style="font-size:11px; color:var(--muted);">
        Call IRS: <span style="color:var(--accent);">1-800-829-1040</span><br>
        Say: <em>"I'd like to request a First-Time Penalty Abatement"</em>
      </div>
    </div>

    <!-- FTA Steps -->
    <div class="card" style="--accent-line: var(--accent);">
      <div class="card-label">First-Time Abatement (FTA) — How It Works</div>
      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-content">
            <div class="step-title">Confirm Eligibility</div>
            <div class="step-desc">No penalties in prior 3 years · All returns filed · Tax paid or in arrangement</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-content">
            <div class="step-title">Call or Write</div>
            <div class="step-desc">Phone = fastest (same call decision). Letter = use Form 843 if already paid penalty.</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-content">
            <div class="step-title">FTA Granted → $600 Wiped</div>
            <div class="step-desc">Covers failure-to-file + failure-to-pay. One-time use.</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">4</div>
          <div class="step-content">
            <div class="step-title">Resets in 3 Clean Years</div>
            <div class="step-desc">File on time, pay what you owe — eligible again after 2025, 2026, 2027.</div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Savings Potential Banner -->
  <div class="total-bar">
    <div>
      <div class="total-label">💡 Potential Savings if You Optimize</div>
      <div class="total-sub">Using available credits + abatement + deductions</div>
    </div>
    <div class="total-nums">
      <div class="total-item">
        <div class="total-item-label">FTA Saves</div>
        <div class="total-item-val" style="color:var(--accent);">$600</div>
      </div>
      <div class="total-item">
        <div class="total-item-label">EITC (if eligible)</div>
        <div class="total-item-val" style="color:var(--yellow);">+$632</div>
      </div>
      <div class="total-item">
        <div class="total-item-label">Max Potential Savings</div>
        <div class="total-item-val" style="color:#fff;">~$1,232</div>
      </div>
    </div>
  </div>

  <!-- Savings Options Board -->
  <div class="section-title">Savings & Credits — All Options</div>
  <div class="savings-grid">

    <div class="savings-card" style="--card-accent: var(--accent); animation-delay:0.05s;">
      <div class="savings-icon">🏛️</div>
      <div class="savings-name">Federal EITC</div>
      <div class="savings-value" style="color:var(--accent);">Up to $632 (no kids)</div>
      <div class="savings-desc">Earned Income Tax Credit. At $30K single no kids you're near the edge — confirm with your tax guy if you qualify. With 1 child: up to $3,995.</div>
      <span class="badge badge-green">Refundable</span>
    </div>

    <div class="savings-card" style="--card-accent: var(--warn); animation-delay:0.1s;">
      <div class="savings-icon">⚠️</div>
      <div class="savings-name">FTA Penalty Waiver</div>
      <div class="savings-value" style="color:var(--warn);">$600 saved</div>
      <div class="savings-desc">First-Time Abatement removes your late filing penalty entirely. Clean 3-year history required. Push your tax guy to make the call.</div>
      <span class="badge badge-green">One-Time Use</span>
    </div>

    <div class="savings-card" style="--card-accent: var(--blue); animation-delay:0.15s;">
      <div class="savings-icon">📦</div>
      <div class="savings-name">Traditional IRA</div>
      <div class="savings-value" style="color:var(--blue);">Up to $7,000/yr</div>
      <div class="savings-desc">Contributions are tax-deductible, reducing your taxable income. At $30K, a $5K IRA contribution could cut your federal tax by ~$550.</div>
      <span class="badge badge-blue">Pre-Tax</span>
    </div>

    <div class="savings-card" style="--card-accent: var(--yellow); animation-delay:0.2s;">
      <div class="savings-icon">🏥</div>
      <div class="savings-name">HSA (Health Savings)</div>
      <div class="savings-value" style="color:var(--yellow);">Up to $4,150/yr</div>
      <div class="savings-desc">Triple tax benefit: deductible contributions, tax-free growth, tax-free withdrawals for medical. Requires a high-deductible health plan.</div>
      <span class="badge badge-yellow">Triple Tax Advantage</span>
    </div>

    <div class="savings-card" style="--card-accent: var(--purple); animation-delay:0.25s;">
      <div class="savings-icon">🎓</div>
      <div class="savings-name">Student Loan Interest</div>
      <div class="savings-value" style="color:var(--purple);">Up to $2,500</div>
      <div class="savings-desc">If you paid student loan interest, it's deductible above-the-line. Phases out above $75K income — at $30K you get the full deduction.</div>
      <span class="badge badge-purple">Above-the-Line</span>
    </div>

    <div class="savings-card" style="--card-accent: var(--accent); animation-delay:0.3s;">
      <div class="savings-icon">🌱</div>
      <div class="savings-name">CA CalEITC</div>
      <div class="savings-value" style="color:var(--muted);">Not eligible at $30K</div>
      <div class="savings-desc">California's EITC caps out at ~$22,302 income. You're over the threshold. Worth knowing for future years if income dips.</div>
      <span class="badge" style="background:rgba(107,107,138,0.15); color:var(--muted); border:1px solid var(--border);">Income Too High</span>
    </div>

    <div class="savings-card" style="--card-accent: var(--blue); animation-delay:0.35s;">
      <div class="savings-icon">💼</div>
      <div class="savings-name">Self-Employment Deductions</div>
      <div class="savings-value" style="color:var(--blue);">Varies</div>
      <div class="savings-desc">If any income is freelance/1099: home office, phone, software, mileage all deductible. Reduces both income tax AND self-employment tax.</div>
      <span class="badge badge-blue">If Self-Employed</span>
    </div>

    <div class="savings-card" style="--card-accent: var(--yellow); animation-delay:0.4s;">
      <div class="savings-icon">📱</div>
      <div class="savings-name">Saver's Credit</div>
      <div class="savings-value" style="color:var(--yellow);">Up to $1,000</div>
      <div class="savings-desc">If you contribute to a retirement account (IRA, 401k), you may qualify for an additional 10–50% credit on contributions. At $30K income you likely qualify.</div>
      <span class="badge badge-yellow">Non-Refundable</span>
    </div>

  </div>

  <div style="margin-top: 32px; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; font-size:11px; color:var(--muted); line-height:1.7;">
    ⚡ <strong style="color:var(--text);">Next 3 Actions:</strong> &nbsp;
    (1) Push your tax guy to call IRS for FTA — not your job. &nbsp;
    (2) Confirm federal EITC eligibility with him. &nbsp;
    (3) Open a Traditional IRA before April 15 deadline to reduce this year's taxable income.
  </div>

</div>
</body>
</html>
